services:
  - type: web
    name: nati-bot
    runtime: node
    buildCommand: npx pnpm@10 install --frozen-lockfile && npx pnpm@10 --filter @workspace/api-server run build
    startCommand: npx pnpm@10 --filter @workspace/api-server run start
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: SESSION_SECRET
        sync: false
